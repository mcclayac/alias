apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: tonyapp-deploy
  name: tonyapp-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tonyapp-deploy
  strategy: {}
  template:
    metadata:
      labels:
        app: tonyapp-deploy
    spec:
      containers:
      - image: mcclayac/tonyapp:v0.0.19
        name: tonyapp
        env:
          - name: MS_URL
            value: coreyapp-deploy-lb-svc
          - name: MS_PORT
            value: "4000"
        ports:
        - containerPort: 3000
        resources: {}
status: {}
