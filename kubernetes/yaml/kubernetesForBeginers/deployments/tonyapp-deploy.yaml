apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: tonyapp-deploy
  name: tonyapp-deploy
spec:
  replicas: 10 
  selector:
    matchLabels:
      app: tonyapp-deploy
  strategy: {}
  template:
    metadata:
      labels:
        app: tonyapp-deploy
    spec:
      containers:
      - image: mcclayac/tonyapp:v0.0.13
        name: tonyapp
        ports:
        - containerPort: 3000
        resources: {}
status: {}
