apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app2: nginx-deployment
    app: webserver
  name: nginx-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app2: nginx-deployment
      app: webserver
  strategy:
     rollingUpdate:
       maxSurge: 1
       maxUnavailable: 1
     type:  RollingUpdate
  template:
    metadata:
      labels:
        app2: nginx-deployment
        app: webserver
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
